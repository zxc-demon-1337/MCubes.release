services:
  web:
    build: .
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"] ## удалить в проде
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,cybscb.ru,www.cybscb.ru"
      DJANGO_CSRF_TRUSTED_ORIGINS: "https://cybscb.ru,https://www.cybscb.ru"
      # DJANGO_SECRET_KEY: "change-me"
    volumes:
      - .:/app
      - ./media:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request; u='http://127.0.0.1:8000/healthz/'; sys.exit(0 if urllib.request.urlopen(u,timeout=2).read().decode('utf-8').strip()=='ok' else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    env_file:
      - .env

  db:  # ✅ db должен быть на одном уровне с web (внутри services)
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: